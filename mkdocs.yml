site_name: ETo
site_description: Python package for calculating reference evapotranspiration (FAO 56)
site_url: https://mullenkamp.github.io/ETo/

repo_url: https://github.com/mullenkamp/ETo
repo_name: mullenkamp/ETo

theme:
    name: material
    icon:
        logo: material/water
    palette:
        # Palette toggle for light mode
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: green
          accent: teal
          toggle:
            icon: material/brightness-7
            name: Switch to dark mode

        # Palette toggle for dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: green
          accent: teal
          toggle:
            icon: material/brightness-4
            name: Switch to light mode

    features:
        - navigation.sections
        - navigation.expand
        - navigation.top
        - content.code.copy
        - toc.follow

markdown_extensions:
    - toc:
        permalink: true
    - admonition
    - pymdownx.details
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.tasklist:
        custom_checkbox: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.tabbed:
        alternate_style: true

plugins:
    - search
    - mkdocstrings:
        handlers:
            python:
                inventories:
                    - https://docs.python.org/3.11/objects.inv
                    - https://numpy.org/doc/stable/objects.inv
                options:
                    docstring_style: numpy
                    show_root_heading: true
                    show_source: false
                    show_if_no_docstring: false

watch:
    - docs
    - eto

nav:
    - Home: index.md
    - Getting Started:
        - Installation: getting-started/installation.md
        - Quick Start: getting-started/quickstart.md
    - User Guide:
        - Usage: guide/usage.md
        - Methodology: guide/methodology.md
        - Migration from v1: guide/migration.md
    - Legacy v1.x:
        - Pandas API (v1.x): guide/v1-pandas.md
    - API Reference:
        - Overview: reference/index.md
        - eto: reference/eto.md
